<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Herts Vapes</title>
  <meta name="description" content="Herts Vapes — Fast. Reliable. Local." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <section class="hero" id="home">
      <div class="smoke smoke-one"></div>
      <div class="smoke smoke-two"></div>

      <header class="top-header" aria-label="Herts Vapes header">
        <img class="header-logo" src="herts-vapes-logo.png" alt="Herts Vapes logo" />
      </header>

      <div class="hero-content">
        <h1>HERTS VAPES</h1>
        <p class="tagline">Fast. Reliable. Local.</p>
        <button class="shop-button" type="button" data-scroll-target="#shop">
          SHOP NOW
        </button>
        <span class="scroll-hint">↓</span>
      </div>
    </section>

    <section class="shop" id="shop" aria-label="Herts Vapes menu">
      <div class="section-heading">
        <p class="eyebrow">Browse</p>
        <h2>Menu</h2>
      </div>
      <div class="accordion" id="menuAccordion"></div>
    </section>
  </main>

  <nav class="contact-bar" aria-label="Order contact options">
    <a class="contact-link whatsapp" id="whatsappLink" href="https://wa.me/447000000000?text=Hi%20Herts%20Vapes%2C%20I%27d%20like%20to%20place%20an%20order." target="_blank" rel="noopener">
      <span>WhatsApp</span>
    </a>
    <a class="contact-link snapchat" id="snapchatLink" href="https://www.snapchat.com/add/chazza_manhood" target="_blank" rel="noopener">
      <span>Snapchat</span>
    </a>
  </nav>

  <script src="script.js"></script>
</body>
</html>
