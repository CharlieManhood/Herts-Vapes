.shop-now{margin-top:clamp(20px,4vh,38px);min-width:min(245px,64vw);height:60px;display:inline-flex;align-items:center;justify-content:center;gap:14px;border:1.4px solid rgba(255,31,43,.95);border-radius:24px;background:linear-gradient(180deg,rgba(225,0,18,.25),rgba(62,0,5,.34));color:white;text-decoration:none;font-size:17px;font-weight:900;letter-spacing:.09em;text-transform:uppercase;box-shadow:0 0 20px rgba(239,17,28,.45),0 0 68px rgba(239,17,28,.17),inset 0 0 0 1px rgba(255,255,255,.04);transition:transform .16s ease;animation:fadeUp .7s ease both .34s;z-index:4;}
.shop-now:active{transform:scale(.97)}.shop-now svg{width:22px;height:22px;color:#fff}
.contact-panel{width:min(92vw,760px);margin-top:clamp(26px,5.2vh,56px);display:grid;grid-template-columns:1fr 1fr;border:1px solid rgba(255,255,255,.70);border-radius:15px;overflow:hidden;background:rgba(3,3,4,.48);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);box-shadow:0 0 18px rgba(239,17,28,.12),inset 0 0 0 1px rgba(255,255,255,.02);opacity:.82;z-index:5;transition:opacity .35s ease,transform .35s ease,box-shadow .35s ease;animation:fadeUp .7s ease both .5s;}
body.scrolled .contact-panel,.contact-panel.live{opacity:1;transform:translateY(-2px);box-shadow:0 0 22px rgba(239,17,28,.18),0 8px 24px rgba(0,0,0,.40)}
.contact-panel a{min-height:64px;padding:9px 12px;display:flex;align-items:center;justify-content:center;gap:10px;color:#fff;text-decoration:none;text-transform:uppercase;}
.contact-panel a:first-child{border-right:1px solid rgba(255,255,255,.30)}
.app-badge{width:31px;height:31px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto}
.wa{background:#22cf60;box-shadow:0 0 12px rgba(34,207,96,.20)}.sc{background:#ffe51c;box-shadow:0 0 12px rgba(255,229,28,.18)}
.app-badge svg{width:21px;height:21px}.wa svg{color:#fff}.sc svg{color:#fff;filter:drop-shadow(0 0 1px #000)}
.contact-copy{text-align:left;min-width:0;flex:1}.contact-copy strong{display:block;font-size:clamp(12px,3.55vw,18px);font-weight:900;letter-spacing:.055em;line-height:1}.contact-copy span{display:block;margin-top:4px;color:rgba(255,255,255,.56);font-size:clamp(8.5px,2.65vw,13px);font-weight:800;letter-spacing:.075em;line-height:1}.contact-panel .chev{font-size:26px;line-height:1;color:rgba(255,255,255,.58);font-weight:300}
.scroll-cue{margin-top:clamp(24px,4.6vh,46px);color:var(--red);opacity:.95;animation:bounce 1.5s ease-in-out infinite,fadeUp .7s ease both .65s;filter:drop-shadow(0 0 13px rgba(239,17,28,.56));z-index:4}.scroll-cue svg{width:38px;height:38px}
.shop{min-height:80vh;background:#050505;padding:52px 18px 110px}.shop h2{margin:0;text-align:center;font-size:28px;letter-spacing:.08em;text-transform:uppercase}.shop p{text-align:center;color:var(--muted);font-weight:800}
@keyframes bgDrift{0%{transform:scale(1.05) translate3d(-.7%,.4%,0)}100%{transform:scale(1.08) translate3d(.7%,-.5%,0)}}
@keyframes fadeDown{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes logoIn{from{opacity:0;transform:scale(.965) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
@media(max-width:430px){.top-strip{gap:8px;font-size:8.6px;height:50px;width:94vw;top:calc(20px + env(safe-area-inset-top))}.top-strip svg{width:15px;height:15px}.top-strip .divider{height:19px}.hero-main{margin-top:38px;padding-top:3.5vh}.logo-wrap{width:82vw}.shop-now{height:58px;min-width:230px;font-size:16px;border-radius:23px}.contact-panel{width:94vw;margin-top:29px;border-radius:13px}.contact-panel a{min-height:62px;padding:8px 10px;gap:9px}.app-badge{width:29px;height:29px}.app-badge svg{width:19px;height:19px}.contact-panel .chev{font-size:24px}.scroll-cue svg{width:36px;height:36px}}
@media(max-height:720px){.hero-main{padding-top:2vh}.logo-wrap{width:min(76vw,600px)}.shop-now{margin-top:18px;height:54px}.contact-panel{margin-top:22px}.scroll-cue{margin-top:18px}}
</style>
